name: SentinelARC CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r docker/requirements-streamlit.txt
        pip install -r docker/requirements-agents.txt

    - name: Syntax Check & Linting
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/ streamlit_app.py --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Test Docker Compose Build
      run: |
        docker compose -f docker-compose.optimized.yml build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to Cloud (Render/Streamlit Community)
      run: |
        echo "Successfully built and tested the main branch."
        echo "In a production environment, this step would trigger a webhook to Render,"
        echo "or push the Docker images to a container registry like Docker Hub/GHCR."
        echo "Streamlit Community Cloud automatically redeploys when the main branch is updated."
